apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-kafka-bridge
  namespace: emqx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mqtt-kafka-bridge
  template:
    metadata:
      annotations:
        version: v3
      labels:
        app: mqtt-kafka-bridge
    spec:
      containers:
      - args:
        - pip install --quiet 'paho-mqtt>=2.0.0' 'kafka-python-ng>=2.0.0' && python -u /app/bridge.py
        command:
        - /bin/sh
        - -c
        env:
        - name: MQTT_HOST
          value: emqx.emqx.svc.cluster.local
        - name: MQTT_PORT
          value: "1883"
        - name: KAFKA_BOOTSTRAP
          value: redpanda.aiot.svc.cluster.local:9092
        - name: KAFKA_TOPIC
          value: telemetry
        image: python:3.11-slim
        name: bridge
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /app
          name: code
      nodeSelector:
        kubernetes.io/hostname: instance-worker-02
      volumes:
      - configMap:
          name: mqtt-kafka-bridge-code
        name: code
