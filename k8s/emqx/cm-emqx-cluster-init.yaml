apiVersion: v1
data:
  ensure-cluster.sh: |
    #!/bin/sh
    # Počkaj kým EMQX naštartuje
    echo "[CLUSTER] Waiting for EMQX to start..."
    until emqx ctl broker status >/dev/null 2>&1; do
      sleep 2
    done
    echo "[CLUSTER] EMQX is running"

    MY_NODE=$(emqx eval "node()." 2>/dev/null | tr -d "'")
    echo "[CLUSTER] My node: $MY_NODE"

    # Ak som emqx-0, som seed node - nič nerobím
    if echo "$MY_NODE" | grep -q "^emqx-0@"; then
      echo "[CLUSTER] I am seed node, waiting for others to join"
    else
      # Čakaj kým emqx-0 bude dostupný
      echo "[CLUSTER] Waiting for seed node emqx-0..."
      until emqx ctl cluster status 2>/dev/null | grep -q "emqx-0@"; do
        # Skús join
        emqx ctl cluster join 'emqx-0@emqx-0.emqx-headless.emqx.svc.cluster.local' 2>/dev/null && break
        sleep 5
      done
      echo "[CLUSTER] Joined cluster"
    fi

    # Zobraz stav
    emqx ctl cluster status

    # Udržuj proces živý a kontroluj cluster
    while true; do
      NODES=$(emqx ctl cluster status 2>/dev/null | grep -c "running_nodes")
      if [ "$NODES" -eq 0 ]; then
        echo "[CLUSTER] Lost cluster, rejoining..."
        emqx ctl cluster join 'emqx-0@emqx-0.emqx-headless.emqx.svc.cluster.local' 2>/dev/null
      fi
      sleep 60
    done
