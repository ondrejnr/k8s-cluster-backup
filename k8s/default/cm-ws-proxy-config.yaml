apiVersion: v1
data:
  server.js: |
    const http = require('http');
    const net = require('net');

    const TARGET_HOST = 'xpra-svc';
    const TARGET_PORT = 14501;

    let connections = 0;

    const server = http.createServer((req, res) => {
      const options = {
        hostname: TARGET_HOST,
        port: TARGET_PORT,
        path: req.url,
        method: req.method,
        headers: req.headers,
      };
      const proxy = http.request(options, (proxyRes) => {
        res.writeHead(proxyRes.statusCode, proxyRes.headers);
        proxyRes.pipe(res);
      });
      proxy.on('error', (err) => {
        console.error('[HTTP ERROR]', err.message);
        res.writeHead(502);
        res.end();
      });
      req.pipe(proxy);
    });

    server.on('upgrade', (req, clientSocket, head) => {
      connections++;
      const id = connections;
      console.log('[WS] New connection #' + id);

      clientSocket.setNoDelay(true);
      clientSocket.setKeepAlive(true, 10000);
      clientSocket.pause();

      const serverSocket = net.connect(TARGET_PORT, TARGET_HOST, () => {
        serverSocket.setNoDelay(true);
        serverSocket.setKeepAlive(true, 10000);

        let rawHeaders = `${req.method} ${req.url} HTTP/1.1\r\n`;
        for (let i = 0; i < req.rawHeaders.length; i += 2) {
          rawHeaders += `${req.rawHeaders[i]}: ${req.rawHeaders[i+1]}\r\n`;
        }
        if (!req.rawHeaders.join(' ').includes('Sec-WebSocket-Protocol')) {
          rawHeaders += 'Sec-WebSocket-Protocol: binary\r\n';
        }
        rawHeaders += '\r\n';
        serverSocket.write(rawHeaders);
        if (head && head.length) serverSocket.write(head);
      });

      let bytesFromServer = 0;
      let bytesFromClient = 0;
      let headerDone = false;

      serverSocket.on('data', (data) => {
        if (!headerDone) {
          console.log('[WS] Server 101 received');
          headerDone = true;
          clientSocket.write(data);
          serverSocket.pipe(clientSocket);
          clientSocket.pipe(serverSocket);
          clientSocket.resume();
        }
        bytesFromServer += data.length;
      });

      serverSocket.on('error', (err) => console.error('[SERVER ERROR]', err.message));
      clientSocket.on('error', (err) => console.error('[CLIENT ERROR]', err.message));
      clientSocket.on('data', (data) => { bytesFromClient += data.length; });
      clientSocket.on('close', () => {
        connections--;
        console.log('[WS] Closed #' + id + ' bytes S->' + bytesFromServer + ' C->' + bytesFromClient);
        serverSocket.destroy();
      });
      serverSocket.on('close', () => {
        console.log('[WS] Server closed #' + id);
        clientSocket.destroy();
      });
    });

    server.listen(8080, () => {
      console.log('WS raw proxy v4 listening on :8080');
    });
