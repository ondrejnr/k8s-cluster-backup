apiVersion: batch/v1
kind: CronJob
metadata:
  creationTimestamp: "2026-03-09T12:44:48Z"
  generation: 1
  name: pg-partition-mgr
  namespace: aiot
  resourceVersion: "1442859"
  uid: 89ed0a0a-a6a5-43e8-8dd5-55381a26f25b
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      activeDeadlineSeconds: 60
      template:
        metadata:
          creationTimestamp: null
        spec:
          containers:
          - args:
            - |
              PG="psql -h postgres.aiot.svc.cluster.local -U aiot_admin -d aiot"

              echo "=== DROP old partitions ==="
              CUTOFF=$(date -u -d '2 hours ago' '+%Y%m%d_%H')
              echo "Cutoff: $CUTOFF"

              OLD_PARTS=$($PG -t -c "SELECT inhrelid::regclass FROM pg_inherits WHERE inhparent = 'sensor_data'::regclass AND inhrelid::regclass::text ~ '_[0-9]{8}_[0-9]{2}' ORDER BY 1;")

              for PART in $OLD_PARTS; do
                PART_TS=$(echo $PART | grep -oE '[0-9]{8}_[0-9]{2}')
                if [ "$PART_TS" \< "$CUTOFF" ]; then
                  echo "DROP: $PART"
                  $PG -c "DROP TABLE $PART;"
                else
                  echo "KEEP: $PART"
                fi
              done

              echo "=== CREATE future partitions ==="
              for H in 0 1 2 3; do
                $PG -c "DO \$\$DECLARE s timestamptz; e timestamptz; n text; BEGIN s:=date_trunc('hour',now())+('$H hours')::interval; e:=s+interval '1 hour'; n:='sensor_data_part_'||to_char(s,'YYYYMMDD_HH24'); IF NOT EXISTS(SELECT 1 FROM pg_class WHERE relname=n) THEN EXECUTE format('CREATE TABLE %I PARTITION OF sensor_data FOR VALUES FROM (%L) TO (%L)',n,s,e); RAISE NOTICE 'Created: %',n; END IF; END\$\$;"
              done

              echo "=== CLEANUP default ==="
              $PG -c "DELETE FROM sensor_data_part_default WHERE ts < now() - interval '2 hours';"

              echo "=== Partitions ==="
              $PG -c "SELECT inhrelid::regclass as p, pg_size_pretty(pg_total_relation_size(inhrelid)) as size FROM pg_inherits WHERE inhparent='sensor_data'::regclass ORDER BY 1;"

              echo "=== DONE ==="
            command:
            - sh
            - -c
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: pg-credentials
            - name: PGOPTIONS
              value: -c statement_timeout=0
            image: postgres:16
            imagePullPolicy: IfNotPresent
            name: cleanup
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
  schedule: 5 * * * *
  successfulJobsHistoryLimit: 3
  suspend: false
status:
  lastSuccessfulTime: "2026-03-09T12:50:34Z"
